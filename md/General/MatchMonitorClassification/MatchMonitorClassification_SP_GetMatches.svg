<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="1313px" preserveAspectRatio="none" style="width:675px;height:1313px;background:#FFFFFF;" version="1.1" viewBox="0 0 675 1313" width="675px" zoomAndPan="magnify"><defs/><g><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="436" x="118" y="34.5332">CTS_DC_CustClassification_MatchMonitor_Get - Detailed Flow</text><ellipse cx="165.5" cy="58.6094" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1.0;"/><path d="M340,78.6094 L340,112.3125 L320,116.3125 L340,120.3125 L340,154.0156 A0,0 0 0 0 340,154.0156 L663,154.0156 A0,0 0 0 0 663,154.0156 L663,88.6094 L653,78.6094 L340,78.6094 A0,0 0 0 0 340,78.6094 " fill="#FFF9C4" style="stroke:#FBC02D;stroke-width:0.5;"/><path d="M653,78.6094 L653,88.6094 L663,88.6094 L653,78.6094 " fill="#FFF9C4" style="stroke:#FBC02D;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="59" x="346" y="97.1045">Database</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="206" x="405" y="97.1045">: CTS_DataCenter.ctsServiceAdmin</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="52" x="346" y="113.4561">Purpose</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="250" x="398" y="113.4561">: Get list of matches needing status update</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="60" x="346" y="129.8076">Called by</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="190" x="406" y="129.8076">: UpdateStatusMatchMonitor Job</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="77" x="346" y="146.1592">Return Type</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="126" x="423" y="146.1592">: List&lt;int&gt; (MatchIDs)</text><rect fill="#FFE0B2" height="35.0938" rx="12.5" ry="12.5" style="stroke:#F57C00;stroke-width:0.5;" width="309" x="11" y="98.7656"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="19" x="21" y="121.2227">SP:</text><text fill="#000000" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="267" x="43" y="121.2227">CTS_DC_CustClassification_MatchMonitor_Get</text><path d="M234.5,164.0156 L234.5,418.4648 L214.5,422.4648 L234.5,426.4648 L234.5,680.9141 A0,0 0 0 0 234.5,680.9141 L555.5,680.9141 A0,0 0 0 0 555.5,680.9141 L555.5,174.0156 L545.5,164.0156 L234.5,164.0156 A0,0 0 0 0 234.5,164.0156 " fill="#FFF9C4" style="stroke:#FBC02D;stroke-width:0.5;"/><path d="M545.5,164.0156 L545.5,174.0156 L555.5,174.0156 L545.5,164.0156 " fill="#FFF9C4" style="stroke:#FBC02D;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="77" x="240.5" y="182.5107">Query Logic</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4" x="317.5" y="182.5107">:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="29" x="240.5" y="198.8623">```sql</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="162" x="240.5" y="215.2139">SELECT DISTINCT MatchID</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="146" x="240.5" y="231.5654">FROM CTSMatchMonitor</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="75" x="240.5" y="247.917">WHERE 1=1</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="149" x="248.5" y="264.2686">-- Get unfinished matches</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="157" x="248.5" y="280.6201">AND (EventStatus IS NULL</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="260" x="268.5" y="296.9717">OR EventStatus NOT IN ('Closed', 'Finished'))</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="8" x="240.5" y="313.3232">&#160;&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="118" x="248.5" y="329.6748">-- Not yet completed</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="126" x="248.5" y="346.0264">AND IsCompleted = 0</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="8" x="240.5" y="362.3779">&#160;&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="144" x="248.5" y="378.7295">-- Has associated details</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="83" x="248.5" y="395.0811">AND EXISTS (</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="61" x="256.5" y="411.4326">SELECT 1</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="190" x="256.5" y="427.7842">FROM CTSMatchMonitorDetail d</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="284" x="256.5" y="444.1357">WHERE d.MatchID = CTSMatchMonitor.MatchID</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4" x="248.5" y="460.4873">)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4" x="240.5" y="476.8389">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="151" x="240.5" y="493.1904">ORDER BY MatchID ASC</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="12" x="240.5" y="509.542">```</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4" x="240.5" y="525.8936">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="39" x="240.5" y="542.2451">Filters</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4" x="279.5" y="542.2451">:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="249" x="240.5" y="558.5967">- Unfinished matches (not Closed/Finished)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="199" x="240.5" y="574.9482">- Not completed (IsCompleted = 0)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="130" x="240.5" y="591.2998">- Has detection details</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4" x="240.5" y="607.6514">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="52" x="240.5" y="624.0029">Purpose</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4" x="292.5" y="624.0029">:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="204" x="240.5" y="640.3545">- Get matches needing status sync</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="185" x="240.5" y="656.7061">- Maintain accurate EventStatus</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="131" x="240.5" y="673.0576">- Track match lifecycle</text><rect fill="#FFE0B2" height="35.0938" rx="12.5" ry="12.5" style="stroke:#F57C00;stroke-width:0.5;" width="98" x="116.5" y="404.918"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="78" x="126.5" y="427.375">Execute Query</text><path d="M249,690.9141 L249,757.3203 L229,761.3203 L249,765.3203 L249,831.7266 A0,0 0 0 0 249,831.7266 L480,831.7266 A0,0 0 0 0 480,831.7266 L480,700.9141 L470,690.9141 L249,690.9141 A0,0 0 0 0 249,690.9141 " fill="#FFF9C4" style="stroke:#FBC02D;stroke-width:0.5;"/><path d="M470,690.9141 L470,700.9141 L480,700.9141 L470,690.9141 " fill="#FFF9C4" style="stroke:#FBC02D;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="102" x="255" y="709.4092">Output Example</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4" x="357" y="709.4092">:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="192" x="255" y="725.7607">[12345, 67890, 11111, 22222, ...]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4" x="255" y="742.1123">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="39" x="255" y="758.4639">Usage</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4" x="294" y="758.4639">:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="210" x="255" y="774.8154">- Convert to comma-separated string</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="195" x="255" y="791.167">- Pass to CTS_MatchInfo_Get SP</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="172" x="255" y="807.5186">- Get match info from MainDB</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="189" x="255" y="823.8701">- Update status in CTS database</text><rect fill="#FFE0B2" height="35.0938" rx="12.5" ry="12.5" style="stroke:#F57C00;stroke-width:0.5;" width="127" x="102" y="743.7734"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="107" x="112" y="766.2305">Return MatchID List</text><path d="M222.5,841.7266 L222.5,1047.1211 L202.5,1051.1211 L222.5,1055.1211 L222.5,1260.5156 A0,0 0 0 0 222.5,1260.5156 L468.5,1260.5156 A0,0 0 0 0 468.5,1260.5156 L468.5,851.7266 L458.5,841.7266 L222.5,841.7266 A0,0 0 0 0 222.5,841.7266 " fill="#FFF9C4" style="stroke:#FBC02D;stroke-width:0.5;"/><path d="M458.5,841.7266 L458.5,851.7266 L468.5,851.7266 L458.5,841.7266 " fill="#FFF9C4" style="stroke:#FBC02D;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="121" x="228.5" y="860.2217">Key Characteristics</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4" x="349.5" y="860.2217">:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4" x="228.5" y="876.5732">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="99" x="228.5" y="892.9248">Simple SELECT</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4" x="327.5" y="892.9248">:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="184" x="228.5" y="909.2764">- No INSERT/UPDATE/DELETE</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="123" x="228.5" y="925.6279">- Read-only operation</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="94" x="228.5" y="941.9795">- Fast execution</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4" x="228.5" y="958.3311">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="56" x="228.5" y="974.6826">Used For</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4" x="284.5" y="974.6826">:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="141" x="228.5" y="991.0342">- Status synchronization</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="103" x="228.5" y="1007.3857">- Maintenance job</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="128" x="228.5" y="1023.7373">- Keep CTS data fresh</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4" x="228.5" y="1040.0889">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="81" x="228.5" y="1056.4404">Not Used For</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4" x="309.5" y="1056.4404">:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="116" x="228.5" y="1072.792">- Classification logic</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="95" x="228.5" y="1089.1436">- Detection rules</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="110" x="228.5" y="1105.4951">- Customer tagging</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4" x="228.5" y="1121.8467">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="82" x="228.5" y="1138.1982">Performance</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4" x="310.5" y="1138.1982">:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="225" x="228.5" y="1154.5498">- Indexed on EventStatus, IsCompleted</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="175" x="228.5" y="1170.9014">- DISTINCT to avoid duplicates</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="146" x="228.5" y="1187.2529">- Ordered for consistency</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4" x="228.5" y="1203.6045">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="95" x="228.5" y="1219.9561">Related Tables</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4" x="323.5" y="1219.9561">:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="152" x="228.5" y="1236.3076">- CTSMatchMonitor (main)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="217" x="228.5" y="1252.6592">- CTSMatchMonitorDetail (referenced)</text><rect fill="#FFE0B2" height="35.0938" rx="12.5" ry="12.5" style="stroke:#F57C00;stroke-width:0.5;" width="74" x="128.5" y="1033.5742"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="54" x="138.5" y="1056.0313">Complete</text><ellipse cx="165.5" cy="1291.5156" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1.0;"/><ellipse cx="165.5" cy="1291.5156" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="165.5" x2="165.5" y1="68.6094" y2="98.7656"/><polygon fill="#181818" points="161.5,88.7656,165.5,98.7656,169.5,88.7656,165.5,92.7656" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="165.5" x2="165.5" y1="133.8594" y2="404.918"/><polygon fill="#181818" points="161.5,394.918,165.5,404.918,169.5,394.918,165.5,398.918" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="165.5" x2="165.5" y1="440.0117" y2="743.7734"/><polygon fill="#181818" points="161.5,733.7734,165.5,743.7734,169.5,733.7734,165.5,737.7734" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="165.5" x2="165.5" y1="778.8672" y2="1033.5742"/><polygon fill="#181818" points="161.5,1023.5742,165.5,1033.5742,169.5,1023.5742,165.5,1027.5742" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="165.5" x2="165.5" y1="1068.668" y2="1280.5156"/><polygon fill="#181818" points="161.5,1270.5156,165.5,1280.5156,169.5,1270.5156,165.5,1274.5156" style="stroke:#181818;stroke-width:1.0;"/><!--SRC=[ZLLjZ-8s4FwUNp5IFomWO65xBxszNgKb2JrwB50Ir5PLjMkI0TmBTcext76_lcCdOGExbHe9ANWUpyippqmCDnc27qSFWV_W5zhu6TEQRtZ239VYuPwPP7Sl1JTIFVoC1deGe64ymnJ6cVpYUVep5pbJR0zhbdpUAbc8r9UPLF3Ts3qDn8w9z8lYng203SiqDcmiCVp0pN7qt4iu6DsyX9GgHLMZNh_r1uC6IaY3B_WQl_DVNQBE_8pymKr0PHccZ7SRBMwXq_d__7Gwxpth4nJVxem7T3bWXgsPnaxdjYIQ_lie3Af-OdI4wi0Jl4ltN3Zueb2vBD6Mxunh0t83Uni8DGZ4b8ijK7wcq53aAJFeBleiirrP7-tLbJkF7AYP8_mYrmwzH5Ce0V4nTw6c5EP7BinFq7BmIQ3R7ehK4UHvj-5NJ0egwzS2rV5PYUuKfdBB4t96Hu-FZ_gVZ5wYS1hwCGIJA9xCwALoJfRnSdvl-MXcHyU_VGoN8Gm_3EaTeDTp91HYmmNNEoglui5PxsO1jC83SLaM2fC8Pglf59pLFVCbD06pUGoJ6RIk_8muJg-wS3MkF5-rs-vQ7NSc3HmfTYBtUOO6qrF8YVRhC_W0WxDR7va64eXCEBFcrCtAKxRXxqH41AqgmOgTOPtmIv