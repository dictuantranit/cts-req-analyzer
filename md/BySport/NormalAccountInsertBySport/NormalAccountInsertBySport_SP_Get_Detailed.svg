3179 L637,266.3179 L346,266.3179 A0,0 0 0 0 346,266.3179 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><path d="M637,266.3179 L637,276.3179 L647,276.3179 L637,266.3179 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="60" x="352" y="284.3877">Columns:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="246" x="352" y="300.187">- ID, CustId, SportGroup, CategoryId</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="261" x="352" y="315.9863">- CreatedTime, TurnoverRM, WinlossRM</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="280" x="352" y="331.7856">- BetCount, ActiveDays, PerformanceTime</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="87" x="352" y="347.585">- RowVersion</text><rect fill="#FFFFFF" height="34.584" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1.0;" width="230" x="96" y="293.5242"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="210" x="106" y="315.5886">Create temp table #tmpRawData</text><path d="M383.5,365.3145 L383.5,405.8127 L363.5,409.8127 L383.5,413.8127 L383.5,454.311 A0,0 0 0 0 383.5,454.311 L669.5,454.311 A0,0 0 0 0 669.5,454.311 L669.5,375.3145 L659.5,365.3145 L383.5,365.3145 A0,0 0 0 0 383.5,365.3145 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><path d="M659.5,365.3145 L659.5,375.3145 L669.5,375.3145 L659.5,365.3145 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="265" x="389.5" y="383.3843">Source: CustomerClassification_BySport</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="250" x="389.5" y="399.1836">Filter: RowVersion &gt; LastScannedRow</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="249" x="389.5" y="414.9829">AND RowVersion &lt;= NextScannedRow</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="175" x="389.5" y="430.7822">Order by: RowVersion ASC</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="113" x="389.5" y="446.5815">Limit: TOP 10000</text><rect fill="#FFFFFF" height="34.584" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1.0;" width="305" x="58.5" y="392.5208"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="285" x="68.5" y="414.5852">Insert TOP 10000 records into #tmpRawData</text><path d="M363.5,470.8037 L363.5,487.603 L343.5,491.603 L363.5,495.603 L363.5,512.4023 A0,0 0 0 0 363.5,512.4023 L670.5,512.4023 A0,0 0 0 0 670.5,512.4023 L670.5,480.8037 L660.5,470.8037 L363.5,470.8037 A0,0 0 0 0 363.5,470.8037 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><path d="M660.5,470.8037 L660.5,480.8037 L670.5,480.8037 L660.5,470.8037 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="231" x="369.5" y="488.8735">ScannedMaxId = MAX(RowVersion)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="286" x="369.5" y="504.6729">This will be used to update parameter later</text><rect fill="#FFFFFF" height="34.584" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1.0;" width="265" x="78.5" y="474.311"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="245" x="88.5" y="496.3755">Get ScannedMaxId from #tmpRawData</text><path d="M376.5,522.4023 L376.5,547.1013 L356.5,551.1013 L376.5,555.1013 L376.5,579.8003 A0,0 0 0 0 376.5,579.8003 L1112.5,579.8003 A0,0 0 0 0 1112.5,579.8003 L1112.5,