<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="767px" preserveAspectRatio="none" style="width:1000px;height:767px;background:#FFFFFF;" version="1.1" viewBox="0 0 1000 767" width="1000px" zoomAndPan="magnify"><defs/><g><text fill="#000000" font-family="Verdana" font-size="22" font-weight="bold" lengthAdjust="spacing" textLength="896" x="50.5" y="37.1182">Daily Problem Classification By Sport - SP GetFromQueue Detailed Flow</text><ellipse cx="222.5" cy="62.7373" fill="#FFFFFF" rx="10" ry="10" style="stroke:#000000;stroke-width:1.0;"/><path d="M459,82.7373 L459,115.3359 L439,119.3359 L459,123.3359 L459,155.9346 A0,0 0 0 0 459,155.9346 L993,155.9346 A0,0 0 0 0 993,155.9346 L993,92.7373 L983,82.7373 L459,82.7373 A0,0 0 0 0 459,82.7373 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><path d="M983,82.7373 L983,92.7373 L993,92.7373 L983,82.7373 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="245" x="465" y="100.8071">Database: CTS_DataCenter (MySQL)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="513" x="465" y="116.6064">Tables: SystemParameter, CTSCustomerClassification_BySport_DailyPAQueue</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="422" x="465" y="132.4058">CTSCustomerClassification_BySport, CustomerCategorySettings</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="175" x="465" y="148.2051">Parameter: @ip_BatchSize</text><rect fill="#FFFFFF" height="34.584" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1.0;" width="433" x="6" y="102.0439"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="413" x="16" y="124.1084">CTS_DC_CustClassification_BySport_DailyScanPA_GetFromQueue</text><path d="M394.5,172.4272 L394.5,189.2266 L374.5,193.2266 L394.5,197.2266 L394.5,214.0259 A0,0 0 0 0 394.5,214.0259 L590.5,214.0259 A0,0 0 0 0 590.5,214.0259 L590.5,182.4272 L580.5,172.4272 L394.5,172.4272 A0,0 0 0 0 394.5,172.4272 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><path d="M580.5,172.4272 L580.5,182.4272 L590.5,182.4272 L580.5,172.4272 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="158" x="400.5" y="190.4971">SELECT ParameterValue</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="175" x="400.5" y="206.2964">WHERE ParameterID = 200</text><rect fill="#FFFFFF" height="34.584" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1.0;" width="304" x="70.5" y="175.9346"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="284" x="80.5" y="197.999">Get LastScannedTime from SystemParameter</text><path d="M360.5,224.0259 L360.5,248.7249 L340.5,252.7249 L360.5,256.7249 L360.5,281.4238 A0,0 0 0 0 360.5,281.4238 L708.5,281.4238 A0,0 0 0 0 708.5,281.4238 L708.5,234.0259 L698.5,224.0259 L360.5,224.0259 A0,0 0 0 0 360.5,224.0259 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><path d="M698.5,224.0259 L698.5,234.0259 L708.5,234.0259 L698.5,224.0259 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="327" x="366.5" y="242.0957">LastScannedTime = LastScannedTime + 24 hours</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="268" x="366.5" y="257.895">This ensures we only process customers</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="304" x="366.5" y="273.6943">that have been in queue for at least 24 hours</text><rect fill="#FFFFFF" height="34.584" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1.0;" width="236" x="104.5" y="235.4329"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="216" x="114.5" y="257.4973">Add 24 Hours to LastScannedTime</text><path d="M312,291.4238 L312,324.0225 L292,328.0225 L312,332.0225 L312,364.6211 A0,0 0 0 0 312,364.6211 L578,364.6211 A0,0 0 0 0 578,364.6211 L578,301.4238 L568,291.4238 L312,291.4238 A0,0 0 0 0 312,291.4238 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><path d="M568,291.4238 L568,301.4238 L578,301.4238 L568,291.4238 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="119" x="318" y="309.4937">Temp_Customers:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="190" x="318" y="325.293">- CustID (BIGINT UNSIGNED)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="126" x="318" y="341.0923">- SportGroup (INT)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="245" x="318" y="356.8916">- PRIMARY KEY (CustID, SportGroup)</text><rect fill="#FFFFFF" height="34.584" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1.0;" width="139" x="153" y="310.7305"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="119" x="163" y="332.7949">Create Temp Table</text><path d="M361.5,374.6211 L361.5,446.718 L341.5,450.718 L361.5,454.718 L361.5,526.8149 A0,0 0 0 0 361.5,526.8149 L777.5,526.8149 A0,0 0 0 0 777.5,526.8149 L777.5,384.6211 L767.5,374.6211 L361.5,374.6211 A0,0 0 0 0 361.5,374.6211 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><path d="M767.5,374.6211 L767.5,384.6211 L777.5,384.6211 L767.5,374.6211 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="318" x="367.5" y="392.6909">SELECT ccdpa.ID, cc.CustID, ccdpa.SportGroup</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="200" x="367.5" y="408.4902">FROM DailyPAQueue AS ccdpa</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="307" x="367.5" y="424.2896">JOIN CCBySport ON cc.CustID = ccdpa.CustID</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="241" x="377.5" y="440.0889">AND cc.SportID = ccdpa.SportGroup</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="395" x="367.5" y="455.8882">JOIN CategorySettings ON cc.CategoryID = ccs.CategoryID</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="336" x="367.5" y="471.6875">WHERE ccdpa.CreatedTime &lt;= @LastScannedTime</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="198" x="377.5" y="487.4868">AND ccs.FlowPADailyScan = 1</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="116" x="367.5" y="503.2861">ORDER BY ID ASC</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="139" x="367.5" y="519.0854">LIMIT @ip_BatchSize</text><rect fill="#FFFFFF" height="34.584" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1.0;" width="238" x="103.5" y="433.426"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="218" x="113.5" y="455.4905">Get Customers from DailyPAQueue</text><path d="M332,536.8149 L332,561.5139 L312,565.5139 L332,569.5139 L332,594.2129 A0,0 0 0 0 332,594.2129 L571,594.2129 A0,0 0 0 0 571,594.2129 L571,546.8149 L561,536.8149 L332,536.8149 A0,0 0 0 0 332,536.8149 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><path d="M561,536.8149 L561,546.8149 L571,546.8149 L561,536.8149 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="182" x="338" y="554.8848">Filter: FlowPADailyScan = 1</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="218" x="338" y="570.6841">Only process categories that are</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="185" x="338" y="586.4834">configured for daily PA scan</text><rect fill="#FFFFFF" height="34.584" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1.0;" width="179" x="133" y="548.2219"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="159" x="143" y="570.2864">Filter by FlowPADailyScan</text><path d="M323.5,604.2129 L323.5,628.9119 L303.5,632.9119 L323.5,636.9119 L323.5,661.6108 A0,0 0 0 0 323.5,661.6108 L596.5,661.6108 A0,0 0 0 0 596.5,661.6108 L596.5,614.2129 L586.5,604.2129 L323.5,604.2129 A0,0 0 0 0 323.5,604.2129 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><path d="M586.5,604.2129 L586.5,614.2129 L596.5,614.2129 L586.5,604.2129 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="204" x="329.5" y="622.2827">INSERT INTO Temp_Customers</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="252" x="329.5" y="638.082">SELECT DISTINCT CustID, SportGroup</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="68" x="329.5" y="653.8813">FROM CTE</text><rect fill="#FFFFFF" height="34.584" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1.0;" width="162" x="141.5" y="615.6199"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="142" x="151.5" y="637.6843">Insert into Temp Table</text><path d="M298.5,678.1035 L298.5,694.9028 L278.5,698.9028 L298.5,702.9028 L298.5,719.7021 A0,0 0 0 0 298.5,719.7021 L502.5,719.7021 A0,0 0 0 0 502.5,719.7021 L502.5,688.1035 L492.5,678.1035 L298.5,678.1035 A0,0 0 0 0 298.5,678.1035 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><path d="M492.5,678.1035 L492.5,688.1035 L502.5,688.1035 L492.5,678.1035 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="183" x="304.5" y="696.1733">SELECT CustID, SportGroup</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="155" x="304.5" y="711.9727">FROM Temp_Customers</text><rect fill="#FFFFFF" height="34.584" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1.0;" width="112" x="166.5" y="681.6108"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="92" x="176.5" y="703.6753">Return Results</text><ellipse cx="222.5" cy="750.7021" fill="none" rx="11" ry="11" style="stroke:#000000;stroke-width:1.0;"/><ellipse cx="222.5" cy="750.7021" fill="#FFFFFF" rx="6" ry="6" style="stroke:#000000;stroke-width:1.0;"/><line style="stroke:#000000;stroke-width:1.0;" x1="222.5" x2="222.5" y1="72.7373" y2="102.0439"/><polygon fill="#000000" points="218.5,92.0439,222.5,102.0439,226.5,92.0439,222.5,96.0439" style="stroke:#000000;stroke-width:1.0;"/><line style="stroke:#000000;stroke-width:1.0;" x1="222.5" x2="222.5" y1="136.6279" y2="175.9346"/><polygon fill="#000000" points="218.5,165.9346,222.5,175.9346,226.5,165.9346,222.5,169.9346" style="stroke:#000000;stroke-width:1.0;"/><line style="stroke:#000000;stroke-width:1.0;" x1="222.5" x2="222.5" y1="210.5186" y2="235.4329"/><polygon fill="#000000" points="218.5,225.4329,222.5,235.4329,226.5,225.4329,222.5,229.4329" style="stroke:#000000;stroke-width:1.0;"/><line style="stroke:#000000;stroke-width:1.0;" x1="222.5" x2="222.5" y1="270.0168" y2="310.7305"/><polygon fill="#000000" points="218.