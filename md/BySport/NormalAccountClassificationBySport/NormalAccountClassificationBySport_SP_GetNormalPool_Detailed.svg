<text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="164" x="535.75" y="289.4937">- IsCheckBetCount (BIT)</text><rect fill="#FFFFFF" height="34.584" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1.0;" width="139" x="370.75" y="235.4329"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="119" x="380.75" y="257.4973">Create Temp Table</text><path d="M531.75,307.2231 L531.75,331.9221 L511.75,335.9221 L531.75,339.9221 L531.75,364.6211 A0,0 0 0 0 531.75,364.6211 L917.75,364.6211 A0,0 0 0 0 917.75,364.6211 L917.75,317.2231 L907.75,307.2231 L531.75,307.2231 A0,0 0 0 0 531.75,307.2231 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><path d="M907.75,307.2231 L907.75,317.2231 L917.75,317.2231 L907.75,307.2231 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="123" x="537.75" y="325.293">SELECT MAX(c.ID)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="365" x="537.75" y="341.0923">FROM CustomerClassification_BySport_NormalPool AS c</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="109" x="537.75" y="356.8916">@ScannedMaxId</text><rect fill="#FFFFFF" height="34.584" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1.0;" width="143" x="368.75" y="318.6301"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="123" x="378.75" y="340.6946">Get Scanned MaxID</text><path d="M537.25,374.6211 L537.25,407.2197 L517.25,411.2197 L537.25,415.2197 L537.25,447.8184 A0,0 0 0 0 537.25,447.8184 L947.25,447.8184 A0,0 0 0 0 947.25,447.8184 L947.25,384.6211 L937.25,374.6211 L537.25,374.6211 A0,0 0 0 0 537.25,374.6211 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><path d="M937.25,374.6211 L937.25,384.6211 L947.25,384.6211 L937.25,374.6211 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="389" x="543.25" y="392.6909">SELECT CAST(CAST([Value] AS BIGINT) AS ROWVERSION)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="265" x="543.25" y="408.4902">FROM CustomerClassification_Parameter</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="335" x="543.25" y="424.2896">WHERE [DataId] = @BYSPORT_LASTSCANNEDROW</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="125" x="543.25" y="440.0889">@LastScannedRow</text><rect fill="#FFFFFF" height="34.584" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1.0;" width="154" x="363.25" y="393.9277"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="134" x="373.25" y="415.9922">Get LastScannedRow</text><polygon fill="#FFFFFF" points="356.75,467.8184,523.75,467.8184,535.75,479.8184,523.75,491.8184,356.75,491.8184,344.75,479.8184,356.75,467.8184" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="11" lengthAdjust="spacing" textLength="167" x="356.75" y="484.1931">ScannedMaxId IS NOT NULL?</text><text fill="#000000" font-family="Verdana" font-size="11" lengthAdjust="spacing" textLength="20" x="324.75" y="477.5088">yes</text><text fill="#000000" font-family="Verdana" font-size="11" lengthAdjust="spacing" textLength="14" x="535.75" y="477.5088">no</text><path d="M234.75,501.8184 L234.75,629.2129 L214.75,633.2129 L234.75,637.2129 L234.75,764.6074 A0,0 0 0 0 234.75,764.6074 L661.75,764.6074 A0,0 0 0 0 661.75,764.6074 L661.75,511.8184 L651.75,501.8184 L234.75,501.8184 A0,0 0 0 0 234.75,501.8184 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><path d="M651.75,501.8184 L651.75,511.8184 L661.75,511.8184 L651.75,501.8184 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="195" x="240.75" y="519.8882">INSERT INTO #tmpCustomers</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="182" x="240.75" y="535.6875">SELECT TOP(@BATCHSIZE)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="169" x="250.75" y="551.4868">np.CustId, np.SportGroup</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="396" x="250.75" y="567.2861">, CASE WHEN (COUNT(np.CustId) = COUNT(np.FunctionId))</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="344" x="285.75" y="583.0854">AND (COUNT(np.FunctionId) = SUM(np.FunctionId))</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="270" x="260.75" y="598.8848">THEN 1 ELSE 0 END AS IsCheckBetCount</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="373" x="240.75" y="614.6841">FROM CustomerClassification_BySport_NormalPool AS np</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="223" x="240.75" y="630.4834">WHERE np.ID &lt;= @ScannedMaxId</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="125" x="250.75" y="646.2827">AND NOT EXISTS (</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="362" x="270.75" y="662.082">SELECT 1 FROM CustomerClassification_BySport AS cc</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="198" x="270.75" y="677.8813">WHERE cc.CustId = np.CustId</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="216" x="280.75" y="693.6807">AND cc.SportId = np.SportGroup</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="284" x="280.75" y="709.48">AND cc.[RowVersion] &gt; @LastScannedRow</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="6" x="250.75" y="725.2793">)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="240" x="240.75" y="741.0786">GROUP BY np.CustId, np.SportGroup</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="314" x="240.75" y="756.8779">ORDER BY Min(np.Priority) ASC, Min(np.ID) ASC</text><rect fill="#FFFFFF" height="34.584" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1.0;" width="208" x="6.75" y="615.9209"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="188" x="16.75" y="637.9854">Get Top Customers by Priority</text><rect fill="#FFFFFF" height="34.584" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1.0;" width="176" x="681.75" y="501.8184"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="156" x="691.75" y="523.8828">No customers to process</text><polygon fill="#FFFFFF" points="440.25,770.6074,452.25,782.6074,440.25,794.6074,428.25,782.6074,440.25,770.6074" style="stroke:#000000;stroke-width:1.0;"/><path d="M516.25,804.6074 L516.25,845.1057 L496.25,849.1057 L516.25,853.1057 L516.25,893.604 A0,0 0 0 0 516.25,893.604 L826.25,893.604 A0,0 0 0 0 826.25,893.604 L826.25,814.6074 L816.25,804.6074 L516.25,804.6074 A0,0 0 0 0 516.25,804.6074 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><path d="M816.25,804.6074 L816.25,814.6074 L826.25,814.6074 L816.25,804.6074 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="169" x="522.25" y="822.6772">SELECT CustId AS CustId</text><text fill="#000000" font-family="Verdana" font-size="1