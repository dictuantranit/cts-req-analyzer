rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1.0;" width="75" x="427.5" y="259.9966"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="55" x="437.5" y="282.061">JobRun()</text><path d="M515.5,311.0732 L515.5,327.8726 L495.5,331.8726 L515.5,335.8726 L515.5,352.6719 A0,0 0 0 0 515.5,352.6719 L856.5,352.6719 A0,0 0 0 0 856.5,352.6719 L856.5,321.0732 L846.5,311.0732 L515.5,311.0732 A0,0 0 0 0 515.5,311.0732 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><path d="M846.5,311.0732 L846.5,321.0732 L856.5,321.0732 L846.5,311.0732 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="248" x="521.5" y="329.1431">Initialize NormalAccountBySportModel</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="320" x="521.5" y="344.9424">customers = new NormalAccountBySportModel()</text><rect fill="#FFFFFF" height="34.584" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1.0;" width="61" x="434.5" y="314.5806"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="41" x="444.5" y="336.645">Start()</text><path d="M620,362.6719 L620,521.665 L600,525.665 L620,529.665 L620,688.6582 A0,0 0 0 0 620,688.6582 L1087,688.6582 A0,0 0 0 0 1087,688.6582 L1087,372.6719 L1077,362.6719 L620,362.6719 A0,0 0 0 0 620,362.6719 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><path d="M1077,362.6719 L1077,372.6719 L1087,372.6719 L1077,362.6719 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="446" x="626" y="380.7417">Call CTS_DC_CustClassification_BySport_DailyScan_GetNormal [SP]</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="245" x="626" y="396.541">Database: CTS_DataCenter (MySQL)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="80" x="626" y="412.3403">Parameters:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="222" x="626" y="428.1396">- @op_LastCategoryID (OUTPUT)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="192" x="626" y="443.939">- @op_LastCustID (OUTPUT)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="40" x="626" y="459.7383">Logic:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="368" x="626" y="475.5376">- Get normal categories with ScanIntervalInSecond &gt; 0</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="403" x="626" y="491.3369">- Get LastCategoryID and LastCustID from SystemParameter</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="151" x="626" y="507.1362">- Find customers with:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="209" x="636" y="522.9355">* CategoryID = LastCategoryID</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="149" x="636" y="538.7349">* CustID &gt; LastCustID</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="253" x="636" y="554.5342">* LastScannedDate &lt;= ScanDateValid</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="157" x="636" y="570.3335">* Active within 30 days</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="320" x="626" y="586.1328">- If no customers found, move to next category</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="194" x="626" y="601.9321">- Return: CustID, SportGroup</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="253" x="626" y="617.7314">- Output: LastCategoryID, LastCustID</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="56" x="626" y="633.5308">Returns:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="263" x="626" y="649.3301">- NormalAccounts (CustID, SportGroup)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="114" x="626" y="665.1294">- LastCategoryID</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="84" x="626" y="680.9287">- LastCustID</text><rect fill="#FFFFFF" height="34.584" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1.0;" width="270" x="330" y="508.373"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="250" x="340" y="530.4375">GetCustClassificationForDailyScanning()</text><polygon fill="#FFFFFF" points="418.5,708.6582,511.5,708.6582,523.5,720.6582,511.5,732.6582,418.5,732.6582,406.5,720.6582,418.5,708.6582" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="11" lengthAdjust="spacing" textLength="93" x="418.5" y="725.033">Has Customers?</text><text fill="#000000" font-family="Verdana" font-size="11" lengthAdjust="spacing" textLength="20" x="386.5" y="718.3486">yes</text><text fill="#000000" font-family="Verdana" font-size="11" lengthAdjust="spacing" textLength="14" x="523.5" y="718.3486">no</text><path d="M282,742.6582 L282,846.3538 L262,850.3538 L282,854.3538 L282,958.0493 A0,0 0 0 0 282,958.0493 L701,958.0493 A0,0 0 0 0 701,958.0493 L701,752.6582 L691,742.6582 L282,742.6582 A0,0 0 0 0 282,742.6582 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><path d="M691,742.6582 L691,752.6582 L701,752.6582 L691,742.6582 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="176" x="288" y="760.728">Convert customers to XML</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="398" x="288" y="776.5273">Call CTS_BySportNormalClassification_Daily_Preprocess [SP]</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="267" x="288" y="792.3267">Database: bodb_VR2Model (SQL Server)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="80" x="288" y="808.126">Parameters:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="165" x="288" y="823.9253">- @CustomersXML (XML)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="40" x="288" y="839.7246">Logic:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="170" x="288" y="855.5239">- Parse XML customer list</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="187" x="288" y="871.3232">- Remove disabled accounts</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="304" x="288" y="887.1226">- Remove already scanned customers (today)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="379" x="288" y="902.9219">- Remove inactive customers (no transaction in 30 days)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="209" x="288" y="918.7212">- Get Priority from Priority table</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="158" x="288" y="934.5205">- Call NormalPool_Insert</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="275" x="288" y="950.3198">- Insert into Normal Pool for classification</text><rect fill="#FFFFFF" height="34.584" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1.0;" width="256" x="6" y="833.0618"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="236" x="16" y="855.1262">PreprocessDailyNormalClassification()</text><path d="M220.5,968.0493 L220.5,1016.4473 L200.5,1020.4473 L220.5,1024.4473 L220.5,1072.8452 A0,0 0 0 0 220.5,1072.8452 L709.5,1072.8452 A0,0 0 0 0 709.5,1072.8452 L709.5,978.0493 L699.5,968.0493 L220.5,968.0493 A0,0 0 0 0 220.5,968.0493 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><path d="M699.5,968.0493 L699.5,978.0493 L709.5,978.0493 L699.5,968.0493 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="174" x="226.5" y="986.1191">Update SystemParameter:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="468" x="226.5" y="1001.9185">- ParameterID = 114 (DailyNormalClassificationBySportLastCategoryID)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="157" x="236.5" y="1017.7178">Value = LastCategoryID</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="438" x="226.5" y="1033.5171">- ParameterID = 115 (DailyNormalClassificationBySportLastCustID)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="127" x="236.5" y="1049.3164">Value = LastCustID</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="187" x="226.5" y="1065.1157">Return: true (continue loop)</text><rect fill="#FFFFFF" height="34.584" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1.0;" width="133" x="67.5" y="1003.1553"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textL