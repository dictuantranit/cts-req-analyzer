st</text><rect fill="#FFFFFF" height="34.584" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1.0;" width="112" x="254" y="1021.2961"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="92" x="264" y="1043.3606">Return Results</text><ellipse cx="310" cy="1098.2871" fill="none" rx="11" ry="11" style="stroke:#000000;stroke-width:1.0;"/><ellipse cx="310" cy="1098.2871" fill="#FFFFFF" rx="6" ry="6" style="stroke:#000000;stroke-width:1.0;"/><line style="stroke:#000000;stroke-width:1.0;" x1="310" x2="310" y1="72.7373" y2="92.7373"/><polygon fill="#000000" points="306,82.7373,310,92.7373,314,82.7373,310,86.7373" style="stroke:#000000;stroke-width:1.0;"/><line style="stroke:#000000;stroke-width:1.0;" x1="310" x2="310" y1="127.3213" y2="160.1353"/><polygon fill="#000000" points="306,150.1353,310,160.1353,314,150.1353,310,154.1353" style="stroke:#000000;stroke-width:1.0;"/><line style="stroke:#000000;stroke-width:1.0;" x1="310" x2="310" y1="194.7192" y2="235.4329"/><polygon fill="#000000" points="306,225.4329,310,235.4329,314,225.4329,310,229.4329" style="stroke:#000000;stroke-width:1.0;"/><line style="stroke:#000000;stroke-width:1.0;" x1="310" x2="310" y1="270.0168" y2="310.7305"/><polygon fill="#000000" points="306,300.7305,310,310.7305,314,300.7305,310,304.7305" style="stroke:#000000;stroke-width:1.0;"/><line style="stroke:#000000;stroke-width:1.0;" x1="310" x2="310" y1="345.3145" y2="386.0281"/><polygon fill="#000000" points="306,376.0281,310,386.0281,314,376.0281,310,380.0281" style="stroke:#000000;stroke-width:1.0;"/><line style="stroke:#000000;stroke-width:1.0;" x1="310" x2="310" y1="420.6121" y2="674.6165"/><polygon fill="#000000" points="306,664.6165,310,674.6165,314,664.6165,310,668.6165" style="stroke:#000000;stroke-width:1.0;"/><line style="stroke:#000000;stroke-width:1.0;" x1="310" x2="310" y1="709.2004" y2="961.7979"/><polygon fill="#000000" points="306,951.7979,310,961.7979,314,951.7979,310,955.7979" style="strok