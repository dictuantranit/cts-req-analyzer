<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="1115px" preserveAspectRatio="none" style="width:921px;height:1115px;background:#FFFFFF;" version="1.1" viewBox="0 0 921 1115" width="921px" zoomAndPan="magnify"><defs/><g><text fill="#000000" font-family="Verdana" font-size="22" font-weight="bold" lengthAdjust="spacing" textLength="888" x="15" y="37.1182">Probation Classification By Sport - SP ProbationScan Get Detailed Flow</text><ellipse cx="310" cy="62.7373" fill="#FFFFFF" rx="10" ry="10" style="stroke:#000000;stroke-width:1.0;"/><path d="M517.5,89.23 L517.5,106.0293 L497.5,110.0293 L517.5,114.0293 L517.5,130.8286 A0,0 0 0 0 517.5,130.8286 L796.5,130.8286 A0,0 0 0 0 796.5,130.8286 L796.5,99.23 L786.5,89.23 L517.5,89.23 A0,0 0 0 0 517.5,89.23 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><path d="M786.5,89.23 L786.5,99.23 L796.5,99.23 L786.5,89.23 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="245" x="523.5" y="107.2998">Database: CTS_DataCenter (MySQL)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="258" x="523.5" y="123.0991">Parameter: @op_LastCustID (OUTPUT)</text><rect fill="#FFFFFF" height="34.584" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1.0;" width="375" x="122.5" y="92.7373"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="355" x="132.5" y="114.8018">CTS_DC_CustClassification_BySport_ProbationScan_Get</text><path d="M385.5,140.8286 L385.5,173.4272 L365.5,177.4272 L385.5,181.4272 L385.5,214.0259 A0,0 0 0 0 385.5,214.0259 L637.5,214.0259 A0,0 0 0 0 637.5,214.0259 L637.5,150.8286 L627.5,140.8286 L385.5,140.8286 A0,0 0 0 0 385.5,140.8286 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><path d="M627.5,140.8286 L627.5,150.8286 L637.5,150.8286 L627.5,140.8286 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="181" x="391.5" y="158.8984">CONST_PARENTID_NORMAL</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="231" x="391.5" y="174.6978">CONST_CATEGROUPID_PROBATION</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="189" x="391.5" y="190.4971">CONST_PARENTID_WRAPPER</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="187" x="391.5" y="206.2964">CONST_CATEID_PROBATION</text><rect fill="#FFFFFF" height="34.584" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1.0;" width="111" x="254.5" y="160.1353"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="91" x="264.5" y="182.1997">Get Constants</text><path d="M397.5,224.0259 L397.5,248.7249 L377.5,252.7249 L397.5,256.7249 L397.5,281.4238 A0,0 0 0 0 397.5,281.4238 L684.5,281.4238 A0,0 0 0 0 684.5,281.4238 L684.5,234.0259 L674.5,224.0259 L397.5,224.0259 A0,0 0 0 0 397.5,224.0259 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><path d="M674.5,224.0259 L674.5,234.0259 L684.5,234.0259 L674.5,224.0259 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="233" x="403.5" y="242.0957">lv_CurrentDate = CURRENT_DATE()</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="249" x="403.5" y="257.895">lv_ToLastDay = CurrentDate - 2 days</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="266" x="403.5" y="273.6943">lv_From30Date = CurrentDate - 29 days</text><rect fill="#FFFFFF" height="34.584" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1.0;" width="135" x="242.5" y="235.4329"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="115" x="252.5" y="257.4973">Initialize Variables</text><path d="M399.5,291.4238 L399.5,324.0225 L379.5,328.0225 L399.5,332.0225 L399.5,364.6211 A0,0 0 0 0 399.5,364.6211 L641.5,364.6211 A0,0 0 0 0 641.5,364.6211 L641.5,301.4238 L631.5,291.4238 L399.5,291.4238 A0,0 0 0 0 399.5,291.4238 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><path d="M631.5,291.4238 L631.5,301.4238 L641.5,301.4238 L631.5,291.4238 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="80" x="405.5" y="309.4937">Temp_Cust:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="190" x="405.5" y="325.293">- CustID (BIGINT UNSIGNED)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="145" x="405.5" y="341.0923">- SportID (SMALLINT)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="221" x="405.5" y="356.8916">- PRIMARY KEY (CustID, SportID)</text><rect fill="#FFFFFF" height="34.584" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1.0;" width="139" x="240.5" y="310.7305"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="119" x="250.5" y="332.7949">Create Temp Table</text><path d="M414.5,374.6211 L414.5,399.3201 L394.5,403.3201 L414.5,407.3201 L414.5,432.019 A0,0 0 0 0 414.5,432.019 L756.5,432.019 A0,0 0 0 0 756.5,432.019 L756.5,384.6211 L746.5,374.6211 L414.5,374.6211 A0,0 0 0 0 414.5,374.6211 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><path d="M746.5,374.6211 L746.5,384.6211 L756.5,384.6211 L746.5,374.6211 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="321" x="420.5" y="392.6909">SELECT ParameterValue FROM SystemParameter</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="257" x="420.5" y="408.4902">WHERE ParameterID = 168 (BatchSize)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="264" x="420.5" y="424.2896">WHERE ParameterID = 169 (LastCustID)</text><rect fill="#FFFFFF" height="34.584" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1.0;" width="169" x="225.5" y="386.0281"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="149" x="235.5" y="408.0925">Get System Parameters</text><path d="M419.5,442.019 L419.5,687.9084 L399.5,691.9084 L419.5,695.9084 L419.5,941.7979 A0,0 0 0 0 419.5,941.7979 L797.5,941.7979 A0,0 0 0 0 797.5,941.7979 L797.5,452.019 L787.5,442.019 L419.5,442.019 A0,0 0 0 0 419.5,442.019 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><path d="M787.5,442.019 L787.5,452.019 L797.5,452.019 L787.5,442.019 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="165" x="425.5" y="460.0889">INSERT INTO Temp_Cust</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="241" x="425.5" y="475.8882">SELECT tmplc.CustID, tmplc.SportID</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="330" x="425.5" y="491.6875">FROM CTSCustomerClassification_BySport AS clss</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="103" x="425.5" y="507.4868">LATERAL JOIN (</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="306" x="445.5" y="523.2861">SELECT cc.CustID, cc.SportID, cc.CategoryID</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="290" x="470.5" y="539.0854">, ca.CategoryGroupID, cc.LastScannedDate</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="114" x="470.5" y="554.8848">, cc.CreatedDate</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="321" x="445.5" y="570.6841">FROM CTSCustomerClassification_BySport AS cc</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="245" x="445.5" y="586.4834">INNER JOIN CustomerCategory AS ca</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="233" x="455.5" y="602.2827">ON ca.CategoryID = cc.CategoryID</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="209" x="445.5" y="618.082">WHERE cc.CustID = clss.CustID</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="202" x="455.5" y="633.8813">AND cc.SportID = clss.SportID</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="134" x="455.5" y="649.6807">AND ca.IsActive = 1</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="327" x="455.5" y="665.48">AND ca.ParentID &lt;&gt; CONST_PARENTID_WRAPPER</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="229" x="445.5" y="681.2793">ORDER BY ca.CategoryPriority ASC</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="184" x="480.5" y="697.0786">, cc.LastModifiedDate DESC</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="50" x="445.5" y="712.8779">LIMIT 1</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="70" x="425.5" y="728.6772">) AS tmplc</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="216" x="425.5" y="744.4766">WHERE clss.CustID &gt; LastCustID</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="342" x="435.5" y="760.2759">AND clss.CategoryID = CONST_CATEID_PROBATION</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="270" x="435.5" y="776.0752">AND tmplc.CategoryID = clss.CategoryID</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="251" x="435.5" y="791.8745">AND (tmplc.LastScannedDate IS NULL</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="285" x="460.5" y="807.6738">OR tmplc.LastScannedDate &lt; CurrentDate)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="245" x="435.5" y="823.4731">AND tmplc.CreatedDate &lt; ToLastDay</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="92" x="435.5" y="839.2725">AND EXISTS (</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="318" x="455.5" y="855.0718">SELECT 1 FROM CTSCustomerAssociationStatus</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="242" x="455.5" y="870.8711">WHERE CTSCustID = clss.CTSCustID</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="239" x="465.5" y="886.6704">AND LastTicketDate &gt;= From30Date</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="6" x="435.5" y="902.4697">)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="176" x="425.5" y="918.269">ORDER BY clss.CustID ASC</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="107" x="425.5" y="934.0684">LIMIT BatchSize</text><rect fill="#FFFFFF" height="34.584" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1.0;