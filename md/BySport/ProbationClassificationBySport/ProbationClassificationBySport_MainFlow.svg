" style="stroke:#000000;stroke-width:1.0;" width="75" x="501.5" y="259.9966"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="55" x="511.5" y="282.061">JobRun()</text><path d="M589.5,311.0732 L589.5,327.8726 L569.5,331.8726 L589.5,335.8726 L589.5,352.6719 A0,0 0 0 0 589.5,352.6719 L918.5,352.6719 A0,0 0 0 0 918.5,352.6719 L918.5,321.0732 L908.5,311.0732 L589.5,311.0732 A0,0 0 0 0 589.5,311.0732 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><path d="M908.5,311.0732 L908.5,321.0732 L918.5,321.0732 L908.5,311.0732 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="211" x="595.5" y="329.1431">Initialize ProbationBySportModel</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="308" x="595.5" y="344.9424">probationData = new ProbationBySportModel()</text><rect fill="#FFFFFF" height="34.584" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1.0;" width="61" x="508.5" y="314.5806"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="41" x="518.5" y="336.645">Start()</text><path d="M696,362.6719 L696,521.665 L676,525.665 L696,529.665 L696,688.6582 A0,0 0 0 0 696,688.6582 L1150,688.6582 A0,0 0 0 0 1150,688.6582 L1150,372.6719 L1140,362.6719 L696,362.6719 A0,0 0 0 0 696,362.6719 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><path d="M1140,362.6719 L1140,372.6719 L1150,372.6719 L1140,362.6719 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="433" x="702" y="380.7417">Call CTS_DC_CustClassification_BySport_ProbationScan_Get [SP]</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="245" x="702" y="396.541">Database: CTS_DataCenter (MySQL)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="80" x="702" y="412.3403">Parameters:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="192" x="702" y="428.1396">- @op_LastCustID (OUTPUT)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="40" x="702" y="443.939">Logic:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="401" x="702" y="459.7383">- Get BatchSize from SystemParameter (ParameterID = 168)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="408" x="702" y="475.5376">- Get LastCustID from SystemParameter (ParameterID = 169)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="218" x="702" y="491.3369">- Find probation customers with:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="149" x="712" y="507.1362">* CustID &gt; LastCustID</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="294" x="712" y="522.9355">* CategoryID = CONST_CATEID_PROBATION</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="308" x="712" y="538.7349">* LastScannedDate IS NULL OR &lt; CurrentDate</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="344" x="712" y="554.5342">* CreatedDate &lt; ToLastDay (CurrentDate - 2 days)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="157" x="712" y="570.3335">* Active within 30 days</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="150" x="702" y="586.1328">- Order by CustID ASC</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="133" x="702" y="601.9321">- Limit by BatchSize</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="194" x="702" y="617.7314">- Return: CustID, SportGroup</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="141" x="702" y="633.5308">- Output: LastCustID</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="56" x="702" y="649.3301">Returns:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="256" x="702" y="665.1294">- CustProbations (CustID, SportGroup)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="84" x="702" y="680.9287">- LastCustID</text><rect fill="#FFFFFF" height="34.584" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1.0;" width="274" x="402" y="508.373"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="254" x="412" y="530.4375">GetProbationScanClassificationBySport()</text><polygon fill="#FFFFFF" points="492.5,708.6582,585.5,708.6582,597.5,720.6582,585.5,732.6582,492.5,732.6582,480.5,720.6582,492.5,708.6582" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="11" lengthAdjust="spacing" textLength="93" x="492.5" y="725.033">Has Customers?</text><text fill="#000000" font-family="Verdana" font-size="11" lengthAdjust="spacing" textLength="20" x="460.5" y="718.3486">yes</text><text fill="#000000" font-family="Verdana" font-size="11" lengthAdjust="spacing" textLength="14" x="597.5" y="718.3486">no</text><path d="M318,742.6582 L318,838.4541 L298,842.4541 L318,846.4541 L318,942.25 A0,0 0 0 0 318,942.25 L768,942.25 A0,0 0 0 0 768,942.25 L768,752.6582 L758,742.6582 L318,742.6582 A0,0 0 0 0 318,742.6582 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><path d="M758,742.6582 L758,752.6582 L768,752.6582 L758,742.6582 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="176" x="324" y="760.728">Convert customers to XML</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="429" x="324" y="776.5273">Call CTS_BySportNormalClassification_Probation_Preprocess [SP]</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="267" x="324" y="792.3267">Database: bodb_VR2Model (SQL Server)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="80" x="324" y="808.126">Parameters:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="165" x="324" y="823.9253">- @CustomersXML (XML)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="40" x="324" y="839.7246">Logic:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="170" x="324" y="855.5239">- Parse XML customer list</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="187" x="324" y="871.3232">- Remove disabled accounts</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="379" x="324" y="887.1226">- Remove inactive customers (no transaction in 30 days)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="209" x="324" y="902.9219">- Get Priority from Priority table</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="158" x="324" y="918.7212">- Call NormalPool_Insert</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="275" x="324" y="934.5205">- Insert into Normal Pool for classification</text><rect fill="#FFFFFF" height="34.584" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1.0;" width="292" x="6" y="82