0 0 0 0 279.5,150.1353 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><path d="M508.5,150.1353 L508.5,160.1353 L518.5,160.1353 L508.5,150.1353 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="181" x="285.5" y="168.2051">CONST_PARENTID_NORMAL</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="144" x="285.5" y="184.0044">CONST_PARENTID_PA</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="218" x="285.5" y="199.8037">CONST_PARENTID_POTENTIALPA</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="189" x="285.5" y="215.603">CONST_PARENTID_WRAPPER</text><rect fill="#FFFFFF" height="34.584" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1.0;" width="111" x="148.5" y="169.4419"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="91" x="158.5" y="191.5063">Get Constants</text><path d="M297,233.3325 L297,305.4294 L277,309.4294 L297,313.4294 L297,385.5264 A0,0 0 0 0 297,385.5264 L615,385.5264 A0,0 0 0 0 615,385.5264 L615,243.3325 L605,233.3325 L297,233.3325 A0,0 0 0 0 297,233.3325 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><path d="M605,233.3325 L605,243.3325 L615,243.3325 L605,233.3325 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="119" x="303" y="251.4023">Temp_Customers:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="140" x="303" y="267.2017">- CustID, SportGroup</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="245" x="303" y="283.001">- PRIMARY KEY (CustID, SportGroup)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="5" x="303" y="298.8003">&#160;</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="172" x="303" y="314.5996">Temp_CustomerCategory:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="137" x="303" y="330.3989">- CustID, CTSCustID</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="153" x="303" y="346.1982">- ParentID, CategoryID</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="227" x="303" y="361.9976">- RelevantCategoryID, SportGroup</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="297" x="303" y="377.7969">- INDEX IX_Temp_CustomerCategory_CustID</text><rect fill="#FFFFFF" height="34.584" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1.0;" width="146" x="131" y="292.1375"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="126" x="141" y="314.2019">Create Temp Tables</text><path d="M315.5,395.5264 L315.5,420.2253 L295.5,424.2253 L315.5,428.2253 L315.5,452.9243 A0,0 0 0 0 315.5,452.9243 L588.5,452.9243 A0,0 0 0 0 588.5,452.9243 L588.5,405.5264 L578.5,395.5264 L315.5,395.5264 A0,0 0 0 0 315.5,395.5264 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><path d="M578.5,395.5264 L578.5,405.5264 L588.5,405.5264 L578.5,395.5264 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="204" x="321.5" y="413.5962">INSERT INTO Temp_Customers</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="252" x="321.5" y="429.3955">SELECT DISTINCT CustID, SportGroup</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="248" x="321.5" y="445.1948">FROM JSON_TABLE(@ip_CustInfoList)</text><rect fill="#FFFFFF" height="34.584" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1.0;" width="183" x="112.5" y="406.9333"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="163" x="122.5" y="428.9978">Parse JSON Customer List</text><path d="M334.5,462.9243 L334.5,574.5195 L314.5,578.5195 L334.5,582.5195 L334.5,694.1147 A0,0 0 0 0 334.5,694.1147 L692.5,694.1147 A0,0 0 0 0 692.5,694.1147 L692.5,472.9243 L682.5,462.9243 L334.5,462.9243 A0,0 0 0 0 334.5,462.9243 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><path d="M682.5,462.9243 L682.5,472.9243 L692.5,472.9243 L682.5,462.9243 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="92" x="340.5" y="480.9941">LATERAL JOIN</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="327" x="340.5" y="496.7935">SELECT cc.CustID, cc.CTSCustID, cc.CategoryID</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="250" x="350.5" y="512.5928">, ca.ParentID, ca.RelevantCategoryID</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="321" x="340.5" y="528.3921">FROM CTSCustomerClassification_BySport AS cc</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="245" x="340.5" y="544.1914">INNER JOIN CustomerCategory AS ca</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="233" x="350.5" y="559.9907">ON ca.CategoryID = cc.CategoryID</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="217" x="340.5" y="575.79">WHERE temp.CustID = cc.CustID</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="234" x="350.5" y="591.5894">AND temp.SportGroup = cc.SportID</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="134" x="350.5" y="607.3887">AND ca.IsActive = 1</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="327" x="350.5" y="623.188">AND ca.ParentID &lt;&gt; CONST_PARENTID_WRAPPER</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="229" x="340.5" y="638.9873">ORDER BY ca.CategoryPriority ASC</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="184" x="350.5" y="654.7866">, cc.LastModifiedDate DESC</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="50" x="340.5" y="670.5859">LIMIT 1</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="257" x="340.5" y="686.3853">INSERT INTO Temp_CustomerCategory</text><rect fill="#FFFFFF" height="34.584" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1.0;" width="221" x="93.5" y="561.2275"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="201" x="103.5" y="583.292">Get Current Customer Category</text><path d="M356,704.1147 L356,784.1113 L336,788.1113 L356,792.1113 L356,872.1079 A0,0 0 0 0 356,872.1079 L737,872.1079 A0,0 0 0 0 737,872.1079 L737,714.1147 L727,704.1147 L356,704.1147 A0,0 0 0 0 356,704.1147 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><path d="M727,704.1147 L727,714.1147 L737,714.1147 L727,704.1147 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="119" x="362" y="722.1846">SELECT DISTINCT</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="204" x="362" y="737.9839">temp.CustID, temp.SportGroup</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="216" x="362" y="753.7832">FROM Temp_Customers AS temp</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="296" x="362" y="769.5825">LEFT JOIN Temp_CustomerCategory AS cate</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="204" x="372" y="785.3818">ON cate.CustID = temp.CustID</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="272" x="372" y="801.1812">AND cate.SportGroup = temp.SportGroup</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="216" x="362" y="816.9805">WHERE cate.CategoryID IS NULL</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="227" x="372" y="832.7798">OR (cate.CategoryID IS NOT NULL</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="330" x="392" y="848.5791">AND cate.ParentID = CONST_PARENTID_NORMAL)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="200" x="362" y="864.3784">ResultSet 1: CustomerNormals</text><rect fill="#FFFFFF" height="34.584" rx="12.5" ry="12.5" style="stroke:#000000;stroke-width:1.0;" width="264" x="72" y="770.8193"/><text fill="#000000" font-family="Verdana" font-size="12" lengthAdjust="spacing" textLength="244" x="82" y="792.8838">Return CustomerNormals (ResultSet 1)</text><path d="M372,882.1079 L372,938.4055 L352,942.4055 L372,946.4055 L372,1002.7031 A0,0 0 0 0 372,1002.7031 L717,1002.7031 A0,0 0 0 0 717,1002.7031 L717,892.1079 L707,882.1079 L372,882.1079 A0,0 0 0 0 372,882.1079 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><path d="M707,882.1079 L707,892.1079 L717,892.1079 L707,882.1079 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1.0;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="119" x="378" y="900.1777">SELECT DISTINCT</text><text fill="#00000