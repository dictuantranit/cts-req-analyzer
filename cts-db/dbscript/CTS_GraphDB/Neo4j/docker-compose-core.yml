version: '3.7'
services:
  neo4j-core:
    image: ${NEO4J_TAG}
    hostname: ${HOSTNAME}
    container_name: ${CONTAINER_NAME}
    restart: always
    network_mode: ${NETWORK_DRIVER}
    volumes:
      - ${NEO4J_PLUGINS}:/plugins:rw
      - ${NEO4J_DATA}:/data:rw
      - ${NEO4J_LOGS}:/logs:rw
      - ${NEO4J_IMPORT}:/import:rw
      - ${NEO4J_RUN}:/var/lib/neo4j/run:rw
      - ${NEO4J_CONF}:/var/lib/neo4j/conf:rw
      - ${NEO4J_METRICS}:/var/lib/neo4j/metrics:rw

    environment:
      #timezone
      TZ: ${NEO4J_TZ}

      #clustering
      NEO4J_dbms_mode: ${CLUSTER_MODE}
      NEO4J_causal__clustering_discovery__type: ${CLUSTER_TYPE}
      NEO4J_causal__clustering_enable__pre__voting: ${CLUSTER_PRE_VOTE}
      NEO4J_causal__clustering_refuse__to__be__leader: ${CLUSTER_REFUSE_LEADER}
      NEO4J_causal__clustering_minimum__core__cluster__size__at__runtime: ${CLUSTER_SIZE}
      NEO4J_causal__clustering_initial__discovery__members: ${CLUSTER_MEMBERS}
      NEO4J_causal__clustering_minimum__core__cluster__size__at__formation: ${CLUSTER_SIZE}
      NEO4J_causal__clustering_discovery__advertised__address: "${HOSTNAME}:5000"
      NEO4J_causal__clustering_transaction__advertised__address: "${HOSTNAME}:6000"
      NEO4J_causal__clustering_raft__advertised__address: "${HOSTNAME}:7000"

      #connector
      NEO4J_dbms_connector_bolt_listen__address: "0.0.0.0:7687"
      NEO4J_dbms_connector_bolt_advertised__address: "${HOSTNAME}:7687"
      NEO4J_dbms_connector_http_listen__address: "0.0.0.0:7474"
      NEO4J_dbms_connector_http_advertised__address: "${HOSTNAME}:7474"

    env_file:
      - ./neo4j.env
networks:
  app_network:
    external: ${NETWORK_EXTERNAL}
    name: ${NETWORK_NAME}
    driver: ${NETWORK_DRIVER}
    